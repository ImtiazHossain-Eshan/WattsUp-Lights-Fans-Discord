<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="WattsUp">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0" stop-color="#191119"/>
      <stop offset="55%" stop-color="#0d0b0f"/>
      <stop offset="100%" stop-color="#070709"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#f44174" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#f44174" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f44174" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff9dba"/>
      <stop offset="0.5" stop-color="#f44174"/>
      <stop offset="1" stop-color="#c81e56"/>
    </linearGradient>
    <linearGradient id="hexface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17151b"/>
      <stop offset="1" stop-color="#0c0b0f"/>
    </linearGradient>
    <linearGradient id="hexstroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8fb0"/>
      <stop offset="1" stop-color="#8f2f52"/>
    </linearGradient>
    <filter id="boltGlow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="0.7" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- full-bleed dark disc (Discord crops avatars to a circle) -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- brand energy core, scaled from the 44-unit logo art and centered -->
  <g transform="translate(512,512) scale(17) translate(-22,-22)">
    <path fill="url(#hexface)" stroke="url(#hexstroke)" stroke-width="1.1"
      d="M22 2.6 37.7 11.7a3 3 0 0 1 1.5 2.6v15.4a3 3 0 0 1-1.5 2.6L22 41.4a3 3 0 0 1-3 0L3.3 32.3a3 3 0 0 1-1.5-2.6V14.3a3 3 0 0 1 1.5-2.6L19 2.6a3 3 0 0 1 3 0Z"/>
    <path fill="none" stroke="#f44174" stroke-opacity="0.18" stroke-width="0.5"
      transform="translate(22,22) scale(0.9) translate(-22,-22)"
      d="M22 2.6 37.7 11.7a3 3 0 0 1 1.5 2.6v15.4a3 3 0 0 1-1.5 2.6L22 41.4a3 3 0 0 1-3 0L3.3 32.3a3 3 0 0 1-1.5-2.6V14.3a3 3 0 0 1 1.5-2.6L19 2.6a3 3 0 0 1 3 0Z"/>
    <path filter="url(#boltGlow)" fill="url(#bolt)"
      d="M25 7 13.6 24.2a1 1 0 0 0 .84 1.55H20l-2 11.4a.7.7 0 0 0 1.27.52L31 20.3a1 1 0 0 0-.84-1.55H24l2.3-10.4A.7.7 0 0 0 25 7Z"/>
  </g>
</svg>
